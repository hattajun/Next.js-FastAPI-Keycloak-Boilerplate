# =============================================================================
# docker-compose.yml  ─  開発用
#
# このファイルは開発環境専用です。
#   docker compose up --build          # 通常の起動
#   docker compose down -v             # ボリュームごと削除（Keycloak 設定変更時）
#
# 本番環境では docker-compose.prod.yml を使用してください。
#   docker compose -f docker-compose.prod.yml up --build
#
# 開発環境と本番環境の主な違い:
#   | 項目                  | 開発 (このファイル)       | 本番 (prod.yml)          |
#   |-----------------------|--------------------------|--------------------------|
#   | デバッグポート         | 5678 / 9229 公開         | 公開しない               |
#   | コードボリューム       | ホスト→コンテナにマウント | コンテナに焼き込み済み    |
#   | backend entrypoint    | entrypoint.dev.sh        | entrypoint.sh            |
#   | backend 依存          | requirements-dev.txt も   | requirements.txt のみ    |
#   | frontend 起動         | next dev (HMR 有効)      | next start (本番ビルド)  |
#   | uvicorn               | --reload あり            | --reload なし            |
# =============================================================================

services:
  # ─────────────────────────────────────────────
  # Reverse Proxy: nginx
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Frontend: Next.js（開発モード）
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile      # 開発用（dev:debug スクリプト）
    ports:
      - "3000:3000"
      - "9229:9229"               # Node.js inspector（VSCode デバッグアタッチ用）
    environment:
      NEXTAUTH_URL: http://localhost
      NEXTAUTH_SECRET: change-this-secret-in-production
      KEYCLOAK_CLIENT_ID: nextjs-app
      KEYCLOAK_CLIENT_SECRET: nextjs-app-secret
      KEYCLOAK_ISSUER: http://localhost:8080/realms/myrealm
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/realms/myrealm
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost
      NEXT_PUBLIC_WS_URL: ws://localhost
      WATCHPACK_POLLING: "true"   # Windows bind mount では inotify が届かないためポーリングで監視
    volumes:
      - ./frontend:/app           # ホストコードをマウント（HMR 用）
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Backend: FastAPI（開発モード）
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"       # pytest / debugpy を含む
    command: ["bash", "entrypoint.dev.sh"]   # 開発用（debugpy + --reload）
    ports:
      - "8000:8000"
      - "5678:5678"               # debugpy（VSCode デバッグアタッチ用）
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/appdb
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: myrealm
      KEYCLOAK_CLIENT_ID: fastapi-backend
      CORS_ORIGINS: '["http://localhost", "http://localhost:3000"]'
    volumes:
      - ./backend:/app            # ホストコードをマウント（--reload 用）
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Database: PostgreSQL (App)
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Database: PostgreSQL (Keycloak dedicated)
  # ─────────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Auth: Keycloak
  # ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          exec 3<>/dev/tcp/127.0.0.1/9000 \
          && printf 'GET /health/ready HTTP/1.1\r\nHost: 127.0.0.1\r\n\r\n' >&3 \
          && cat <&3 | grep -q '"UP"' \
          || exit 1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s

volumes:
  postgres_data:
  keycloak_postgres_data:
