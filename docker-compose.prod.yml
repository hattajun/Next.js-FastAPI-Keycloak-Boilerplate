# =============================================================================
# docker-compose.prod.yml  ─  本番用
#
# 起動方法:
#   docker compose -f docker-compose.prod.yml up --build
#   docker compose -f docker-compose.prod.yml down
#
# 開発環境では docker-compose.yml（デフォルト）を使用してください。
#   docker compose up --build
#
# 本番運用前に必ず対応すること（README.md「本番環境に向けた TODO」も参照）:
#   - NEXTAUTH_SECRET を強力なランダム値に変更する（openssl rand -base64 32）
#   - KEYCLOAK_ADMIN_PASSWORD を変更する
#   - KEYCLOAK_CLIENT_SECRET を変更する
#   - KC_HOSTNAME を本番ドメインに変更する
#   - KEYCLOAK_ISSUER を本番ドメインに合わせる
#   - DB パスワードを変更する
#   - nginx に TLS 設定を追加する
# =============================================================================

services:
  # ─────────────────────────────────────────────
  # Reverse Proxy: nginx
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80" # 本番では 443 を追加して TLS を終端する
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  # ─────────────────────────────────────────────
  # Frontend: Next.js（本番ビルド）
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod # マルチステージビルド（next build → next start）
    # ports は公開しない（nginx 経由のみ）
    environment:
      NEXTAUTH_URL: http://localhost # 本番ドメインに変更すること
      NEXTAUTH_SECRET: change-this-secret-in-production # 必ず変更すること
      KEYCLOAK_CLIENT_ID: nextjs-app
      KEYCLOAK_CLIENT_SECRET: nextjs-app-secret # 必ず変更すること
      KEYCLOAK_ISSUER: http://localhost:8080/realms/myrealm # 本番ドメインに変更
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/realms/myrealm
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost # 本番ドメインに変更すること
      NEXT_PUBLIC_WS_URL: ws://localhost # 本番ドメインに変更すること
    # volumes なし（コードはイメージに焼き込み済み）
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    restart: always

  # ─────────────────────────────────────────────
  # Backend: FastAPI（本番モード）
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "false" # 本番: pytest / debugpy を除外
    # デフォルト CMD（entrypoint.sh）をそのまま使用
    # デバッグポート（5678）は公開しない
    ports:
      - "8000:8000" # 本番では削除して nginx 経由のみにすること
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/appdb # パスワードを変更すること
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: myrealm
      KEYCLOAK_CLIENT_ID: fastapi-backend
      CORS_ORIGINS: '["http://localhost"]' # 本番ドメインに変更すること
    # volumes なし（コードはイメージに焼き込み済み）
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: always

  # ─────────────────────────────────────────────
  # Database: PostgreSQL (App)
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # 必ず変更すること
      POSTGRES_DB: appdb
    # ports は公開しない（コンテナ内部からのみアクセス）
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d appdb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # ─────────────────────────────────────────────
  # Database: PostgreSQL (Keycloak dedicated)
  # ─────────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak # 必ず変更すること
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak -d keycloak" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # ─────────────────────────────────────────────
  # Auth: Keycloak
  # ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm # 本番では start（start-dev は非推奨）に変更すること
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak # 必ず変更すること
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin # 必ず変更すること
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8080 # 本番ドメインに変更すること
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080" # 本番では削除して nginx 経由のみにすること
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"UP\"'" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: always

volumes:
  postgres_data:
  keycloak_postgres_data:
