# Alembic 設定ファイル
# sqlalchemy.url は env.py で環境変数 DATABASE_URL から上書きするため、ここでは不要。

[alembic]
script_location = alembic

# マイグレーションファイルの命名規則
# 例: 20250101_create_items_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(slug)s

# タイムゾーン（Create Date に使用）
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
