[pytest]
# 全ての async テスト関数を自動的に asyncio で実行する
asyncio_mode = auto

# テストを探すディレクトリ
testpaths = tests

# デフォルトのオプション
# -v: 詳細表示  --tb=short: 短いトレースバック  -ra: 非合格の要約を表示
addopts = -v --tb=short -ra

# カスタムマーカー定義
markers =
    slow: 実行時間が長いテスト（デフォルトでは実行しない）
    migration: DB を直接変更するマイグレーションテスト

# 無視する警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
