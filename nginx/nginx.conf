# ============================================================
# nginx reverse proxy — boilerplate
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    upstream frontend { server frontend:3000; }
    upstream backend  { server backend:8000;  }

    # 共通プロキシヘッダー
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name localhost;

        # ── セキュリティヘッダー（Chapter 4 - Additional Security Headers）──
        #
        # クリックジャッキング防止: このページを iframe に埋め込ませない
        add_header X-Frame-Options "DENY" always;

        # MIME スニッフィング防止: Content-Type を信頼させる
        add_header X-Content-Type-Options "nosniff" always;

        # リファラー制御: クロスオリジン遷移時はオリジンのみ送信
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 不要なブラウザ機能を無効化
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Content Security Policy
        # 開発環境: unsafe-inline / unsafe-eval は Next.js の HMR・ソースマップに必要
        # 本番環境: nonce ベースに変更し unsafe-inline / unsafe-eval を削除すること
        #   connect-src に 'self' を含めることで WebSocket・SSE・fetch が同一オリジンに制限される
        #   http://localhost:8080 は Keycloak 認証フロー用
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://localhost:8080; font-src 'self'; frame-src http://localhost:8080; frame-ancestors 'none';" always;

        # HSTS（HTTP Strict Transport Security）
        # HTTPS 環境でのみ有効にすること。HTTP で有効化すると接続不能になる。
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;


        # ── 1. WebSocket チケット発行（POST /api/ws/tickets）─────────
        # /api/ より前に定義（より具体的なパスを先に評価）
        # Bearer 認証が必要なため Authorization ヘッダーを透過する
        location /api/ws/tickets {
            proxy_pass http://backend;
            proxy_pass_header Authorization;
        }

        # ── 2. WebSocket 接続（ws://host/ws/{client_id}?ticket=xxx）──
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── 3. SSE（Server-Sent Events /api/sse/）───────────────────
        # /api/ より前に定義すること（より具体的なパスを先に評価）
        # SSE はレスポンスをバッファリングすると即時性が失われるため必ず無効化する
        location /api/sse/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            # keep-alive を維持しつつ Connection ヘッダーをクリア
            proxy_set_header Connection '';
            proxy_buffering  off;
            proxy_cache      off;
            # タスクの処理時間に合わせてタイムアウトを設定（デフォルト 60s では短い）
            proxy_read_timeout 300s;
            proxy_pass_header Authorization;
        }

        # ── 4. NextAuth（/api/auth/）────────────────────────────────
        location /api/auth/ {
            proxy_pass http://frontend;
        }

        # ── 5. FastAPI REST API（/api/）─────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_pass_header Authorization;
        }

        # ── 6. Next.js 静的アセット（immutable キャッシュ）─────────
        location /_next/static/ {
            proxy_pass http://frontend;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── 7. Next.js HMR WebSocket（開発環境）────────────────────
        location /_next/webpack-hmr {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── 8. フロントエンド（フォールバック）─────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_buffering    off;
        }
    }
}
